<div class="kp-bar"><span style="background:#6366f1"></span><span style="background:#22c55e"></span></div>

  <a class="kp-brand" href="index.html">&#8592;&nbsp; Independent Baseball Projections</a>
  <h1 class="kp-h1">Just Tell me What to Bet</h1>

    Gambling problem? Call <a href="tel:18005224700">1-800-GAMBLER</a>.
  </div>
</div>

<script>
var TEAMS = {
  ARI:{n:'Arizona Diamondbacks',c:'#A71930'}, ATL:{n:'Atlanta Braves',c:'#13274F'},
  BAL:{n:'Baltimore Orioles',c:'#DF4601'},    BOS:{n:'Boston Red Sox',c:'#BD3039'},
  CHC:{n:'Chicago Cubs',c:'#0E3386'},         CHW:{n:'Chicago White Sox',c:'#27251F'}, CWS:{n:'Chicago White Sox',c:'#27251F'},
  CIN:{n:'Cincinnati Reds',c:'#C6011F'},      CLE:{n:'Cleveland Guardians',c:'#0C2340'},
  COL:{n:'Colorado Rockies',c:'#333366'},     DET:{n:'Detroit Tigers',c:'#0C2340'},
  HOU:{n:'Houston Astros',c:'#002D62'},       KC:{n:'Kansas City Royals',c:'#004687'}, KCR:{n:'Kansas City Royals',c:'#004687'},
  LAA:{n:'Los Angeles Angels',c:'#BA0021'},   LAD:{n:'Los Angeles Dodgers',c:'#005A9C'},
  MIA:{n:'Miami Marlins',c:'#00A3E0'},        MIL:{n:'Milwaukee Brewers',c:'#12284B'},
  MIN:{n:'Minnesota Twins',c:'#002B5C'},      MET:{n:'New York Mets',c:'#002D72'}, NYM:{n:'New York Mets',c:'#002D72'},
  NYY:{n:'New York Yankees',c:'#0C2340'},     ATH:{n:'Athletics',c:'#003831'}, OAK:{n:'Athletics',c:'#003831'},
  PHI:{n:'Philadelphia Phillies',c:'#E81828'},PIT:{n:'Pittsburgh Pirates',c:'#27251F'},
  SD:{n:'San Diego Padres',c:'#2F241D'}, SDP:{n:'San Diego Padres',c:'#2F241D'},
  SF:{n:'San Francisco Giants',c:'#FD5A1E'}, SFG:{n:'San Francisco Giants',c:'#FD5A1E'},
  SEA:{n:'Seattle Mariners',c:'#0C2C56'},     STL:{n:'St. Louis Cardinals',c:'#C41E3A'},
  TB:{n:'Tampa Bay Rays',c:'#092C5C'}, TBR:{n:'Tampa Bay Rays',c:'#092C5C'},
  TEX:{n:'Texas Rangers',c:'#003278'},        TOR:{n:'Toronto Blue Jays',c:'#134A8E'},
  WSH:{n:'Washington Nationals',c:'#AB0003'}, WSN:{n:'Washington Nationals',c:'#AB0003'}
};
var BOOKS = {
  DraftKings:{url:'https://sportsbook.draftkings.com/leagues/baseball/mlb'},
  FanDuel:{url:'https://sportsbook.fanduel.com/navigation/mlb'},
  Novig:{url:'https://novig.us'}
};
var DEFAULT_BOOK = 'DraftKings';

function payout(am){ return am > 0 ? 1 + am/100 : 1 + 100/Math.abs(am); }
function bestOfThree(bo){
  if (!bo) return null;
  var c = ['DraftKings','FanDuel','Novig'].filter(function(b){ return bo[b] != null; });
  if (!c.length) return null;
  c.sort(function(a,b){ return payout(bo[b]) - payout(bo[a]); });
  return c[0];
}

(function(){
  var slot = document.getElementById('kp-slot');
  fetch('data/today.json?v=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){
      var picks = ((d && d.picks) || []).filter(function(p){
        return p.pick_type === 'MONEYLINE' && typeof p.edge === 'number' && p.edge >= 0.08;
      }).sort(function(a,b){ return b.edge - a.edge; });

      if (!picks.length){
        slot.innerHTML = '<div class="kp-empty">No strong play today.<span>Check back tomorrow.</span></div>';
        document.getElementById('kp-seeall').style.display = 'block';
        return;
      }
      var p = picks[0];
      var t = TEAMS[p.pick] || { n: p.pick, c: '#6366f1' };
      var book = bestOfThree(p.book_odds) || DEFAULT_BOOK;
      var url = (BOOKS[book] || BOOKS[DEFAULT_BOOK]).url;
      slot.innerHTML =
        '<a class="kp-hero-btn" href="' + url + '" target="_blank" rel="noopener noreferrer">' +
          '<span class="kp-badge-lg" style="background:' + t.c + '">' + p.pick + '</span>' +
          '<span class="kp-team-lg">' + t.n + '</span>' +
        '</a>';
      if (picks.length > 1) document.getElementById('kp-seeall').style.display = 'block';
    })
    .catch(function(){
      slot.innerHTML = '<div class="kp-empty">Couldn\'t load today\'s pick.<span>Please refresh.</span></div>';
      document.getElementById('kp-seeall').style.display = 'block';
    });
})();
</script>
